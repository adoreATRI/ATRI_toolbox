name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: win
            artifact: windows-release
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact: linux-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build package
        run: npm run package:${{ matrix.target }} -- --publish never

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish desktop release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$expected_tag"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ATRI Toolbox ${{ github.ref_name }}
          body: |
            本版本集中修复 AI 描述辅助绘图和桌面端稳定性问题：

            - 明确关系现在一定生成节点连线；模型遗漏 `connect` 时会自动补齐。
            - 节点会根据关系方向选择中心、左边界或右边界对齐，关系标签统一显示在线上方并自动避让。
            - AI 修改与手动拖动按实际顺序分别撤销，AI 修改不再改变画布缩放和平移位置。
            - 修复 Windows 与 Linux 关闭窗口后进程无法完整退出的问题。

            Windows 安装版可选择安装范围、安装目录和快捷方式；应用更新会继续使用既有安装位置。

            Windows 用户可直接下载：

            - `atri-toolbox-setup-*.exe`：安装版
            - `atri-toolbox-portable-*.exe`：便携版，下载后直接运行

            Linux 用户可直接下载：

            - `*.AppImage`：通用便携版
            - `*.deb`：Debian / Ubuntu 安装包

            当前版本未配置商业代码签名证书，Windows 首次运行时可能显示安全提醒。
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true

      - name: Verify published assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t expected_assets < <(find artifacts -maxdepth 1 -type f | sort)

          for attempt in {1..6}; do
            published_assets=$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[] | [.name, .label] | .[] | select(. != null and . != "")' || true)
            missing_assets=()

            for asset in "${expected_assets[@]}"; do
              name=$(basename "$asset")

              if ! grep -Fxq "$name" <<<"$published_assets"; then
                missing_assets+=("$name")
              fi
            done

            if [ "${#missing_assets[@]}" -eq 0 ]; then
              printf "Verified %s release assets.\n" "${#expected_assets[@]}"
              exit 0
            fi

            printf "Asset list is not ready (attempt %s/6). Missing:\n" "$attempt"
            printf " - %s\n" "${missing_assets[@]}"
            sleep 5
          done

          exit 1
