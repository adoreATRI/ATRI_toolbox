name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish desktop release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Install Windows packaging runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine wine64
          wine --version

      - name: Build Windows packages
        run: npm run package:win -- --publish never

      - name: Build Linux packages
        run: npm run package:linux -- --publish never

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find release -maxdepth 1 -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.blockmap" -o -name "latest.yml" -o -name "latest-linux.yml" \) -exec cp {} artifacts/ \;
          test "$(find artifacts -type f | wc -l)" -gt 0
          ls -lh artifacts

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find artifacts -type f | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were generated." >&2
            exit 1
          fi

          printf "Publishing release assets:\n"
          printf " - %s\n" "${assets[@]}"

          notes=$(cat <<'NOTES'
          Windows 用户可直接下载：

          - `ATRI Toolbox Setup *.exe`：安装版
          - `ATRI Toolbox *.exe`：便携版，下载后直接运行

          Linux 用户可直接下载：

          - `*.AppImage`：通用便携版
          - `*.deb`：Debian / Ubuntu 安装包

          当前版本未配置商业代码签名证书，Windows 首次运行时可能显示安全提醒。
          NOTES
          )

          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --yes --repo "$REPOSITORY"
          fi

          gh release create "$TAG_NAME" "${assets[@]}" --title "ATRI Toolbox $TAG_NAME" --notes "$notes" --repo "$REPOSITORY" --verify-tag

          published_count=$(gh release view "$TAG_NAME" --repo "$REPOSITORY" --json assets --jq ".assets | length")
          if [ "$published_count" -ne "${#assets[@]}" ]; then
            echo "Expected ${#assets[@]} release assets, but GitHub reports $published_count." >&2
            exit 1
          fi
