name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: win
            artifact: windows-release
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact: linux-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build package
        run: npm run package:${{ matrix.target }} -- --publish never

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish desktop release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$expected_tag"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ATRI Toolbox ${{ github.ref_name }}
          body: |
            Windows 用户可直接下载：

            - `ATRI Toolbox Setup *.exe`：安装版
            - `ATRI Toolbox *.exe`：便携版，下载后直接运行

            Linux 用户可直接下载：

            - `*.AppImage`：通用便携版
            - `*.deb`：Debian / Ubuntu 安装包

            当前版本未配置商业代码签名证书，Windows 首次运行时可能显示安全提醒。
          files: artifacts/*
          fail_on_unmatched_files: true

      - name: Verify published assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          published_assets=$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')

          while IFS= read -r asset; do
            name=$(basename "$asset")
            grep -Fxq "$name" <<<"$published_assets"
          done < <(find artifacts -maxdepth 1 -type f | sort)
