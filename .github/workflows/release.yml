name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build Windows packages
        run: npm run package:win -- --publish never

      - name: Collect Windows assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Get-ChildItem -Path release -File |
            Where-Object { $_.Name -match "\.(exe|blockmap)$" -or $_.Name -eq "latest.yml" } |
            Copy-Item -Destination artifacts

          if (-not (Get-ChildItem -Path artifacts -File)) {
            throw "No Windows release assets were generated."
          }

      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/*
          if-no-files-found: error

  linux:
    name: Build Linux release and publish
    runs-on: ubuntu-latest
    needs:
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build Linux packages
        run: npm run package:linux -- --publish never

      - name: Collect Linux assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find release -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.blockmap" -o -name "latest-linux.yml" \) -exec cp {} artifacts/ \;
          test "$(find artifacts -type f | wc -l)" -gt 0

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find artifacts -type f | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were generated." >&2
            exit 1
          fi

          notes=$(cat <<'NOTES'
          Windows 用户可直接下载：

          - `ATRI Toolbox Setup *.exe`：安装版
          - `ATRI Toolbox *.exe`：便携版，下载后直接运行

          Linux 用户可直接下载：

          - `*.AppImage`：通用便携版
          - `*.deb`：Debian / Ubuntu 安装包

          当前版本未配置商业代码签名证书，Windows 首次运行时可能显示安全提醒。
          NOTES
          )

          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber --repo "$REPOSITORY"
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "ATRI Toolbox $TAG_NAME" --notes "$notes" --repo "$REPOSITORY"
          fi
